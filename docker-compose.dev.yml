services:
  ecom-postgres:
    image: postgres:17
    container_name: ecom-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: "${POSTGRES_MULTIPLE_DATABASES}"
    ports:
      - "${POSTGRES_FORWARD_PORT}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 5432 -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecom-network

  ecom-redis:
    image: redis:7
    container_name: ecom-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - ecom-network

  ecom-minio:
    image: quay.io/minio/minio:latest
    container_name: ecom-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_FORWARD_PORT}:9000"
      - "${MINIO_CONSOLE_FORWARD_PORT}:9001"
    volumes:
      - ./data/minio:/data
    command: [ "server", "--console-address", ":9001", "/data" ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://ecom-minio:${MINIO_FORWARD_PORT}/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ecom-network

  ecom-minio-buckets:
    image: quay.io/minio/mc:latest
    depends_on:
      ecom-minio:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set dockerminio http://ecom-minio:${MINIO_FORWARD_PORT} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing dockerminio/${MINIO_BUCKET_NAME};
      /usr/bin/mc anonymous set download dockerminio/${MINIO_BUCKET_NAME};
      exit 0;
      "
    networks:
      - ecom-network

networks:
  ecom-network:
    driver: bridge

  ecom-auth:
    build:
      context: ./backend/services/auth
      dockerfile: Dockerfile
    container_name: ecom-auth-dev
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: ${AUTH_DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      REDIS_URL: redis://ecom-redis:6379
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
    volumes:
      - ./backend/services/auth:/app
      - /app/node_modules
    depends_on:
      ecom-postgres:
        condition: service_healthy
      ecom-redis:
        condition: service_healthy
    networks:
      - ecom-network

  ecom-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: ecom-gateway-dev
    environment:
      NODE_ENV: development
      GATEWAY_PORT: 3000
      AUTH_SERVICE_URL: http://ecom-auth:3001
      PROFILE_SERVICE_URL: http://ecom-profile:3002
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    ports:
      - "${GATEWAY_PORT}:3000"
    volumes:
      - ./backend/api-gateway:/app
      - /app/node_modules
    depends_on:
      - ecom-auth
    networks:
      - ecom-network